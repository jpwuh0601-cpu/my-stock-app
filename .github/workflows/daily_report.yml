steps:
      - name: Run worker script
        # ... 原有的步驟 ...
      - name: Notify on failure
        if: failure()
        env:
          LINE_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          curl -X POST -H "Authorization: Bearer $LINE_TOKEN" -F "message=❌ 每日任務失敗！請檢查 GitHub Actions Log。" https://notify-api.line.me/api/notify

這樣修改後，如果腳本因為任何原因（如API連線中斷、環境變數遺失）崩潰，您的 LINE 會立刻收到錯誤通知，而不僅是默默失敗。
