name: 每日股市健檢自動化任務

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          # 集中安裝核心依賴，確保 yfinance 與其他科學計算庫相容
          pip install streamlit pandas requests yfinance twstock python-dotenv
        
      - name: 執行健檢腳本
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          python worker.py
