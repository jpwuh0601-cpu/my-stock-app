name: AI 自動化健檢每日任務

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: |
          pip install pandas requests yfinance openai beautifulsoup4 pandas-ta plotly

      - name: 檢查目錄結構與檔案列表
        run: |
          echo "當前目錄結構："
          ls -R
          
      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 確保路徑正確且執行分析
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main_task.py

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 確保正確處理 JSON 變更
          git add market_data.json
          
          if git diff --staged --quiet; then
            echo "沒有資料變更，跳過推送。"
          else
            git commit -m "chore: auto-update market data [skip ci]"
            # 確保拉取遠端最新變更後再推，避免 rejected 錯誤
            git pull --rebase origin main
            git push origin main
          fi
