name: Daily Stock Analysis
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出儲存庫
        uses: actions/checkout@v3
        with:
          # 強制確保拉取最新版本
          fetch-depth: 0
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: 安裝依賴套件
        run: pip install yfinance requests pandas

      - name: 執行數據更新
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "確認當前工作目錄: $(pwd)"
          
          # 遞迴搜尋檔案位置，避免路徑不對稱問題
          echo "正在搜尋 main_task.py..."
          FILE_PATH=$(find . -name "main_task.py" -print -quit)
          
          if [ -n "$FILE_PATH" ]; then
            echo "找到目標檔案: $FILE_PATH，執行中..."
            python "$FILE_PATH"
          else
            echo "錯誤：在整個專案中找不到 main_task.py。"
            echo "請確認您的 GitHub 儲存庫中是否確實存在此檔案。"
            ls -R
            exit 1
          fi
      
      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          git rebase origin/main
          
          git add market_data.json
          
          if git diff-index --quiet HEAD --; then
            echo "沒有數據變更，無需推送。"
          else
            git commit -m "chore: auto-update market data"
            git push origin main
          fi
