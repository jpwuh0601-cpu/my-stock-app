name: Daily Stock Analysis

on:
push:
workflow_dispatch:
schedule:
- cron: '30 0 * * *'

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v3
with:
persist-credentials: true

  - name: 設定 Python 環境
    uses: actions/setup-python@v4
    with:
      python-version: '3.9'

  - name: 安裝套件
    run: pip install pandas requests yfinance openai beautifulsoup4

  - name: 執行分析任務
    env:
      LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    run: python worker.py

  - name: 推送數據至 GitHub
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "github-actions[bot]@users.noreply.github.com"
      # 檢查檔案是否存在，若存在才推送，防止 fatal 錯誤
      if [ -f market_data.json ]; then
        git add market_data.json
        git commit -m "chore: auto-update market data" || echo "No changes to commit"
        git push
      else
        echo "market_data.json not found, skipping push."
      fi
