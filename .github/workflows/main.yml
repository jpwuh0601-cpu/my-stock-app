name: Daily Stock Analysis

on:
  push:
    paths:
      - 'user_config.json' # 當您在網頁儲存代號並 Push 時自動觸發
  schedule:
    - cron: '0 0 * * *' # 每天固定時間執行
  workflow_dispatch: # 支援手動觸發測試

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保 Action 有權限寫入 GitHub 儲存庫
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行分析任務
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main_task.py

      - name: 推送更新至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將產生的數據加入暫存區
          git add market_data.json
          
          # 檢查是否有變更，若無則跳過以避免錯誤
          if git diff-index --quiet HEAD --; then
            echo "沒有檢測到數據變更，跳過推送。"
            exit 0
          fi
          
          # 提交變更
          git commit -m "chore: auto-update market data from web config"
          
          # 先獲取遠端狀態，並以 rebase 方式合併，解決常見推送衝突
          git fetch origin main
          git rebase origin/main
          
          # 推送更新回儲存庫
          git push origin main
