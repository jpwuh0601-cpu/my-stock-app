name: AI 自動化健檢每日任務

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install pandas requests yfinance openai beautifulsoup4 pandas-ta plotly

      - name: 執行分析任務
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main_task.py

      - name: 強制推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將檔案加入並提交
          git add market_data.json
          git commit -m "chore: update market data" || exit 0
          
          # 強制推送至當前分支
          git push origin HEAD:main --force
