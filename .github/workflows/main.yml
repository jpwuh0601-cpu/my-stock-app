name: Daily Stock Analysis
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: 安裝依賴套件
        run: pip install yfinance requests pandas

      # 增加執行前檢查，確保 main_task.py 存在且可執行
      - name: 執行數據更新
        run: |
          if [ -f "main_task.py" ]; then
            python main_task.py
          else
            echo "錯誤：找不到 main_task.py，請檢查檔案路徑。"
            exit 1
          fi
      
      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 強制拉取遠端最新變更並使用 rebase 模式
          git fetch origin main
          git rebase origin/main
          
          # 2. 加入數據檔案
          git add market_data.json
          
          # 3. 檢查變更，若有才提交
          if git diff-index --quiet HEAD --; then
            echo "沒有數據變更，無需推送。"
          else
            git commit -m "chore: auto-update market data"
            git push origin main
          fi
