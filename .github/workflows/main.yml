name: Daily Stock Analysis
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: Run Data Task
        run: python main_task.py
      
      - name: Push Data to Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將檔案放入暫存區
          git add market_data.json
          
          # 檢查是否有變更
          if git diff-index --quiet HEAD --; then
            echo "數據無變更，無需提交。"
          else
            git commit -m "chore: auto-update market data"
            
            # 使用 push 嘗試推送，若因保護分支失敗，改為建立新分支並發起 PR
            # 此處先嘗試標準推送，若失敗則改用自動化 PR 邏輯
            git push origin main || {
              echo "推送至 main 失敗，嘗試發起 Pull Request..."
              BRANCH_NAME="update-data-$(date +%Y%m%d-%H%M%S)"
              git checkout -b $BRANCH_NAME
              git push origin $BRANCH_NAME
              # 這裡建議後續整合 gh pr create 指令以完成自動化
              echo "已推送至分支: $BRANCH_NAME，請至 GitHub 手動建立 Pull Request。"
            }
          fi
