name: Daily Stock Analysis

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所有必要套件
        run: |
          python -m pip install --upgrade pip
          # 1. 鎖定 Pandas 與 NumPy 版本以解決依賴衝突
          pip install pandas==2.2.0 numpy==1.26.4
          pip install requests yfinance openai beautifulsoup4
          # 2. 直接從 GitHub 穩定開發分支安裝，跳過損壞的 PyPI index
          pip install git+https://github.com/twopirllc/pandas-ta.git@development --upgrade
          
      - name: 執行任務與路徑檢查
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 確保 Python 環境包含 pip 安裝路徑
          export PYTHONPATH=$PYTHONPATH:$(python -m site --user-site)
          # 驗證匯入
          python -c "import pandas_ta; print('pandas_ta 匯入路徑:', pandas_ta.__file__)"
          python worker.py

      - name: 推送數據
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "market_data.json" ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git push
          fi
