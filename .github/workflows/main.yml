name: Daily Stock Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所有必要套件
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pandas pandas-ta requests yfinance openai beautifulsoup4
          
      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -f "worker.py" ]; then
            # 改用防禦性測試指令：確保指標計算結果不為空再嘗試取值
            python -c "
import pandas as pd
import pandas_ta as ta
try:
    df = pd.DataFrame({'close': [100.0, 101.0, 102.0, 101.0, 100.0]})
    rsi = ta.rsi(df['close'], length=2)
    if rsi is not None and not rsi.empty:
        print(f'RSI 測試值: {rsi.iloc[-1]}')
    else:
        print('RSI 計算結果為空')
except Exception as e:
    print(f'測試失敗: {e}')
"
            python worker.py
          else
            echo "錯誤：找不到 worker.py"
            exit 1
          fi

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin main
          
          if [ -f "market_data.json" ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git pull --rebase=merge --strategy-option=theirs origin main --allow-unrelated-histories
            git push origin HEAD:main
          else
            echo "錯誤：market_data.json 檔案未產生。"
            exit 1
          fi
