name: Daily Stock Analysis

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: '輸入要分析的股票代號 (例如: 2330.TW)'
        required: true
        default: '2330.TW'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行分析任務
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 直接覆蓋寫入 tickers.txt，確保永遠只有您當下輸入的那一檔
          echo "${{ github.event.inputs.ticker }}" > tickers.txt
          python main_task.py

      - name: 推送更新至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          git commit -m "chore: update data for ${{ github.event.inputs.ticker }}" || echo "No changes"
          git pull --rebase origin main
          git push origin main
