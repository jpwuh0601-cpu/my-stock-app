name: AI 自動化健檢每日任務

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 確保獲取完整歷史以處理 rebase

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: |
          pip install pandas requests yfinance openai beautifulsoup4 pandas-ta
          
      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python worker.py

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將新的數據加入暫存區
          git add market_data.json
          
          # 檢查是否有變更
          if git diff --staged --quiet; then
            echo "沒有資料變更，跳過推送。"
          else
            git commit -m "chore: auto-update market data [skip ci]"
            
            # 先拉取遠端變更並進行 rebase，確保不會發生 fetch first 錯誤
            git pull --rebase origin main
            
            # 推送更新
            git push origin main
          fi
