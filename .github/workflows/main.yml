name: Daily Stock Analysis
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: 安裝依賴套件
        run: pip install yfinance requests pandas

      - name: 執行數據更新
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "當前工作目錄: $(pwd)"
          echo "列出所有檔案結構以進行診斷:"
          find . -maxdepth 3 -name "main_task.py"
          
          # 強制找出 main_task.py 的路徑並執行
          TARGET_FILE=$(find . -name "main_task.py" | head -n 1)
          
          if [ -n "$TARGET_FILE" ]; then
            echo "找到目標檔案: $TARGET_FILE，準備執行..."
            python "$TARGET_FILE"
          else
            echo "錯誤：在整個專案中找不到 main_task.py，請確認檔案已確實提交至 GitHub。"
            exit 1
          fi
      
      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          git rebase origin/main
          
          git add market_data.json
          
          if git diff-index --quiet HEAD --; then
            echo "沒有數據變更，無需推送。"
          else
            git commit -m "chore: auto-update market data"
            git push origin main
          fi
