name: Daily Stock Analysis

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝所有必要套件
        run: |
          pip install pandas requests yfinance openai beautifulsoup4 pandas-ta plotly streamlit

      - name: 執行分析任務
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python main_task.py

      - name: 推送更新至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 先抓取遠端最新進度並變基，確保順序正確
          git pull origin main --rebase
          
          git add market_data.json
          git commit -m "chore: auto-update market data" || echo "No changes detected"
          
          # 嘗試推送，如果失敗則進行最後的強制同步
          git push origin main || (git pull origin main --rebase && git push origin main)
