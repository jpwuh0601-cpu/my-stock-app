name: Trigger Stock Workflow

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所有必要套件
        run: |
          python -m pip install --upgrade pip
          # 安裝基礎穩定依賴
          pip install pandas==2.2.0 numpy==1.26.4 requests yfinance openai beautifulsoup4 bottleneck==1.3.8
          # 使用 git 直接從來源安裝，避開 PyPI 版本匹配問題，並加上 --no-cache-dir 確保安裝成功
          pip install git+https://github.com/twopirllc/pandas-ta.git@development --no-cache-dir

      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 執行分析程式
          python worker.py

      - name: 推送數據
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "market_data.json" ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git push
          fi
