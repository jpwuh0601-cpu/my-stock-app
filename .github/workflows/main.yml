name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      ticker:
        description: '輸入股票代號 (例如: 2330.TW)，留空則使用 tickers.txt'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行分析任務
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          INPUT_TICKER: ${{ github.event.inputs.ticker }}
        run: |
          if [ -n "$INPUT_TICKER" ]; then
            echo "$INPUT_TICKER" > tickers.txt
          fi
          # 執行核心分析邏輯 (確保 worker.py 已更新為最新版本)
          python worker.py

      - name: 推送更新至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 確保遠端狀態同步
          git fetch origin main
          git rebase origin/main
          
          # 加入變更
          git add market_data.json
          
          # 若有變更則提交並推送
          if ! git diff-index --quiet HEAD --; then
            git commit -m "chore: auto-update market data"
            git push origin main
          else
            echo "沒有檢測到數據變更，跳過推送。"
          fi
