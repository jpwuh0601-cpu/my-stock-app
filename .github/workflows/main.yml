name: Daily Stock Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件至本地目錄
        run: |
          python -m pip install --upgrade pip
          # 清除舊目錄並安裝套件
          rm -rf ./libs
          mkdir -p ./libs
          # 採用 --target 安裝，並確保 pandas 與 pandas-ta 版本對齊
          pip install --upgrade pandas requests yfinance openai beautifulsoup4 pandas_ta --target=./libs
          
      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 在執行時動態將 libs 加入 sys.path，避開環境變數解析問題
          export PYTHONPATH="${{ github.workspace }}/libs:$PYTHONPATH"
          if [ -d "libs" ]; then
            python -c "import sys; sys.path.insert(0, '${{ github.workspace }}/libs'); import worker; worker.run_analysis_and_update()"
          else
            echo "錯誤：libs 目錄不存在。"
            exit 1
          fi

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin main
          
          if [ -f "market_data.json" ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git pull --rebase=merge --strategy-option=theirs origin main --allow-unrelated-histories
            git push origin HEAD:main
          else
            echo "錯誤：market_data.json 檔案未產生。"
            exit 1
          fi
