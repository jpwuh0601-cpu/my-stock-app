name: Trigger Stock Workflow

on:
workflow_dispatch:

push:
branches:
- main

schedule:
- cron: '30 0 * * *'

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: 檢出程式碼
    uses: actions/checkout@v3
    with:
      fetch-depth: 0

  - name: 設定 Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: 安裝套件
    run: |
      python -m pip install --upgrade pip

      pip install \
      pandas==2.2.0 \
      numpy==1.26.4 \
      requests \
      yfinance \
      openai==2.44.0 \
      beautifulsoup4 \
      bottleneck==1.3.8 \
      line-bot-sdk

  - name: 執行程式
    env:
      LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    run: |
      python worker.py

  - name: 推送資料
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "github-actions[bot]@users.noreply.github.com"

      if [ -f "market_data.json" ]; then

        git add market_data.json

        git commit -m "chore: auto-update market data" || echo "No changes"

        git pull --rebase origin main

        git push
      fi
```
