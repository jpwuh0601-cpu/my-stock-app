name: AI 自動化健檢每日任務

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          # 確保取得完整歷史紀錄
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: |
          pip install pandas requests yfinance openai beautifulsoup4 pandas-ta plotly

      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main_task.py

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將 market_data.json 加入暫存區
          git add market_data.json
          
          # 檢查是否有變更
          if git diff --staged --quiet; then
            echo "沒有資料變更，跳過推送。"
          else
            git commit -m "chore: auto-update market data [skip ci]"
            
            # 確保取得遠端最新狀態，並強制與當前分支重整
            git fetch origin main
            
            # 為了避免非快進（non-fast-forward）錯誤，使用強制推播策略
            # 這能確保即使 Action 環境與遠端稍有不一致，也能成功將市場數據更新上去
            git push origin HEAD:main --force-with-lease
          fi
