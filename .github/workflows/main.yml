name: Daily Stock Analysis
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出儲存庫
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: 安裝依賴套件
        run: pip install yfinance requests pandas

      - name: 執行數據更新
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # 尋找檔案位置
          FILE_PATH=$(find . -name "main_task.py" -print -quit)
          
          if [ -n "$FILE_PATH" ]; then
            echo "找到目標檔案: $FILE_PATH"
            # 賦予執行權限
            chmod +x "$FILE_PATH"
            # 執行前再次確認路徑
            echo "執行指令: python $FILE_PATH"
            python "$FILE_PATH"
          else
            echo "錯誤：找不到 main_task.py"
            exit 1
          fi
      
      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          git rebase origin/main
          
          git add market_data.json
          
          if git diff-index --quiet HEAD --; then
            echo "沒有數據變更，無需推送。"
          else
            git commit -m "chore: auto-update market data"
            git push origin main
          fi
