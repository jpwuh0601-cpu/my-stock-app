name: Daily Stock Analysis

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          # 1. 先安裝 pandas 確保版本相容
          pip install pandas==2.2.0
          # 2. 安裝其他必要工具
          pip install requests yfinance openai beautifulsoup4
          # 3. 安裝 pandas-ta，若發生錯誤我們在下方進行排錯
          pip install pandas-ta || echo "警告：pandas-ta 安裝失敗，檢查環境相容性"
          
      - name: 執行任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 檢查環境與安裝狀態
          python -c "import pandas; print('Pandas 版本:', pandas.__version__)"
          python -c "import pandas_ta; print('pandas_ta 匯入成功')" || echo "無法匯入 pandas_ta，請檢查安裝路徑"
          python worker.py

      - name: 推送數據
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "market_data.json" ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git push
          fi
