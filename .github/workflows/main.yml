name: Daily Stock Analysis

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝所有必要套件
        run: |
          pip install pandas requests yfinance openai beautifulsoup4 pandas-ta plotly streamlit

      - name: 執行分析任務
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main_task.py

      - name: 推送更新至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 加入隨機延遲，規避與 Streamlit Cloud 同時寫入
          sleep $[ ( $RANDOM % 30 )  + 1 ]s
          
          # 2. 拉取並變基，確保本地進度基於最新遠端
          git pull origin main --rebase
          
          # 3. 提交變更
          git add market_data.json
          git commit -m "chore: auto-update market data" || echo "No changes detected"
          
          # 4. 強制推送 (以 Lease 模式，保護遠端進度)
          git push origin main --force-with-lease
