name: Daily Stock Analysis

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          # 安裝基礎套件
          pip install pandas==2.2.2 requests yfinance openai beautifulsoup4
          # 使用替代安裝指令，強制解析相依性
          pip install git+https://github.com/twopirllc/pandas-ta.git@development

      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python worker.py

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f market_data.json ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git push
          else
            echo "market_data.json not found, skipping push."
          fi
