name: Daily Stock Analysis

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝所有必要套件
        run: |
          pip install pandas requests yfinance openai beautifulsoup4 pandas-ta plotly streamlit twstock

      - name: 執行分析任務並捕捉錯誤
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python main_task.py || { echo "分析任務執行失敗，請檢查 worker.py 邏輯或網路連接"; exit 1; }

      - name: 推送更新至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將修改後的資料加入並提交
          git add market_data.json backtest_history.json
          git commit -m "chore: auto-update market data and AI analysis history" || echo "No changes to commit"
          
          # 強制推送以避免同步衝突
          git push origin main --force
