name: Daily Stock Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所有必要套件
        run: |
          python -m pip install --upgrade pip
          # 強制將套件安裝到當前目錄的 ./deps，確保環境絕對可控
          mkdir -p ./deps
          pip install pandas requests yfinance openai beautifulsoup4 pandas_ta --target=./deps

      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # 優先指定 PYTHONPATH 到我們自定義的 ./deps 目錄
          PYTHONPATH: ${{ github.workspace }}/deps
        run: |
          if [ -f "worker.py" ]; then
            # 直接以環境變數執行，避開系統環境路徑衝突
            python worker.py
          else
            echo "錯誤：找不到 worker.py"
            exit 1
          fi

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin main
          
          if [ -f "market_data.json" ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git pull --rebase=merge --strategy-option=theirs origin main --allow-unrelated-histories
            git push origin HEAD:main
          else
            echo "錯誤：market_data.json 檔案未產生。"
            exit 1
          fi
