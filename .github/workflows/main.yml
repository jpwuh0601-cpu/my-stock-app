name: Daily Stock Analysis

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: '輸入要分析的股票代號 (例如: 2330.TW)'
        required: true
        default: '2330.TW'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行分析任務
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 直接將輸入的股票代號寫入 tickers.txt，確保每次只分析該檔
          echo "${{ github.event.inputs.ticker }}" > tickers.txt
          python main_task.py

      - name: 推送更新至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 將變更全部暫存
          git add market_data.json
          
          # 2. 如果沒有檢測到變更則跳過，避免無效提交
          if git diff-index --quiet HEAD --; then
            echo "沒有資料變更，跳過推送。"
            exit 0
          fi
          
          # 3. 提交變更
          git commit -m "chore: auto-update market data for ${{ github.event.inputs.ticker }}"
          
          # 4. 強制拉取遠端最新狀態並與本地合併
          git pull --rebase origin main
          
          # 5. 推送更新
          git push origin main
