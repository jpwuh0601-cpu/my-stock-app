name: Daily Stock Analysis

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所有必要套件
        run: |
          python -m pip install --upgrade pip
          # 1. 確保基礎庫安裝完成並升級
          pip install pandas==2.2.0 numpy==1.26.4 requests yfinance openai beautifulsoup4
          # 2. 採用 --no-deps 的方式安裝 pandas-ta，避免破壞現有已安裝的穩定依賴庫
          pip install pandas-ta --no-deps
          # 3. 安裝 pandas-ta 所需的極少數必要依賴，確保完整性
          pip install bottleneck==1.3.8

      - name: 執行任務與路徑檢查
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 確保 Python 環境包含 pip 安裝路徑，並優先檢查匯入
          export PYTHONPATH=$PYTHONPATH:$(python -m site --user-site)
          # 強制驗證模組是否存在
          python -c "import sys; import pandas_ta; print('pandas_ta 匯入成功')"
          python worker.py

      - name: 推送數據
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "market_data.json" ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git push
          fi
