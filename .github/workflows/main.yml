name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install yfinance pandas requests

      - name: 執行分析任務
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main_task.py

      - name: 推送更新至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 關鍵修正：強制將未追蹤或已修改的狀態重置，確保環境乾淨
          git reset --hard HEAD
          
          # 拉取最新資料並使用 rebase 以保持紀錄整潔
          git pull --rebase origin main
          
          # 加入變更
          git add market_data.json
          
          # 只有在有變更時才 commit，避免空 commit 錯誤
          git commit -m "chore: auto-update market data" || echo "No changes to commit"
          git push origin main
