name: Daily Stock Analysis
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: Run Data Task
        run: python main_task.py
      
      - name: Push Data to Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add market_data.json
          
          if git diff-index --quiet HEAD --; then
            echo "數據無變更，無需提交。"
          else
            BRANCH_NAME="data-update-$(date +'%Y%m%d-%H%M%S')"
            git checkout -b $BRANCH_NAME
            git commit -m "chore: auto-update market data"
            git push origin $BRANCH_NAME
            gh pr create --title "自動更新數據: $BRANCH_NAME" --body "自動化任務更新 market_data.json" --base main --head $BRANCH_NAME
          fi
