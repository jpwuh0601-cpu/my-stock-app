name: Daily Stock Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2 requests yfinance openai beautifulsoup4
          pip install git+https://github.com/twopirllc/pandas-ta.git@development

      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python worker.py

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin main
          if [ -f market_data.json ]; then
            git reset
            git add market_data.json
            if git diff --cached --quiet; then
              echo "沒有資料變更，跳過推送。"
            else
              git commit -m "chore: auto-update market data"
              git pull --rebase origin main --allow-unrelated-histories
              git push origin HEAD:main
            fi
          else
            echo "market_data.json 未生成，跳過推送步驟。"
          fi
