name: Daily Stock Analysis
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢出儲存庫
        uses: actions/checkout@v3
        with:
          # 強制確保拉取最新版本
          fetch-depth: 0
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: 安裝依賴套件
        run: pip install yfinance requests pandas

      - name: 執行數據更新
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "確認當前工作目錄: $(pwd)"
          echo "目錄下檔案清單:"
          ls -F
          
          # 檢查檔案是否確實存在於根目錄
          if [ -f "main_task.py" ]; then
            echo "找到 main_task.py，執行中..."
            python main_task.py
          else
            echo "錯誤：檔案 main_task.py 不在根目錄中。"
            echo "請檢查您的 GitHub 儲存庫檔案結構，確保 main_task.py 位於專案最外層。"
            exit 1
          fi
      
      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          git rebase origin/main
          
          git add market_data.json
          
          if git diff-index --quiet HEAD --; then
            echo "沒有數據變更，無需推送。"
          else
            git commit -m "chore: auto-update market data"
            git push origin main
          fi
