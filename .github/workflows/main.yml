name: Daily Stock Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所有必要套件
        run: |
          python -m pip install --upgrade pip
          # 使用 --user 安裝，確保執行權限，並將安裝路徑明確加入環境變數
          pip install --user pandas requests yfinance openai beautifulsoup4 pandas_ta
          # 設定 PATH 讓系統能找到透過 --user 安裝的二進位檔案
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
      - name: 執行分析任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # 顯式指定 PYTHONPATH 指向使用者 site-packages，這是 Python 尋找套件的關鍵目錄
          PYTHONPATH: /home/runner/.local/lib/python3.10/site-packages
        run: |
          if [ -f "worker.py" ]; then
            python worker.py
          else
            echo "錯誤：找不到 worker.py"
            exit 1
          fi

      - name: 推送數據至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin main
          
          if [ -f "market_data.json" ]; then
            git add market_data.json
            git commit -m "chore: auto-update market data" || echo "No changes to commit"
            git pull --rebase=merge --strategy-option=theirs origin main --allow-unrelated-histories
            git push origin HEAD:main
          else
            echo "錯誤：market_data.json 檔案未產生。"
            exit 1
          fi
