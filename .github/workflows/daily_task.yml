name: AI 自動化健檢每日任務

on:
  schedule:
    # 每天台灣時間 08:30 執行 (GitHub 使用 UTC 時間，台灣時間需減 8 小時)
    # 08:30 (台灣) = 00:30 (UTC)
    - cron: '30 0 * * *'
  # 允許手動觸發測試
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝依賴套件
        run: |
          pip install twstock pandas requests

      - name: 執行 AI 健檢任務
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          python worker.py
